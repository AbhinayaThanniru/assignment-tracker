apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assignment-backend
  template:
    metadata:
      labels:
        app: assignment-backend
    spec:
      containers:
      - name: backend
        image: assignment-tracer-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: assignment-backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001