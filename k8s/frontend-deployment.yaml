apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assignment-frontend
  template:
    metadata:
      labels:
        app: assignment-frontend
    spec:
      containers:
      - name: frontend
        image: assignment-tracer-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: assignment-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002